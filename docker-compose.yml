version: "3.8"

services:
  taintedport:
    build:
      context: .
      additional_contexts:
        vulns: ../TaintedPort-Vulns
      args:
        # For local Docker: use path-based routing via nginx
        API_URL: /api
    container_name: taintedport
    ports:
      - "8080:80"
    restart: unless-stopped
    environment:
      - NODE_ENV=production
